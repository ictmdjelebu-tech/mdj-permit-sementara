<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem E-Permit - MDJ</title>
    <!-- Ikon Logo MDJ di Tab Browser -->
    <link rel="icon" href="https://lh3.googleusercontent.com/d/1oPU0nhcQmcxtvNdCJVTyIhhvjTA4KHH5" type="image/png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Buang scroll bar luar supaya tak bertindih */
            background-color: #0f172a; /* Warna background sama dengan sistem */
        }
        .iframe-container {
            width: 100%;
            height: 100%;
            /* Trik ajaib untuk tolak banner amaran Google ke atas supaya ghaib */
            margin-top: -45px; 
            height: calc(100% + 45px);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        
        <!-- ↓↓↓ PADAM TULISAN DI BAWAH DAN MASUKKAN LINK APPS SCRIPT BOS ↓↓↓ -->
        <iframe src="https://script.google.com/macros/s/AKfycby2KuYsa6gG7stcFwJ06n2bwZF0XT8tXXBkfYK47_H-IxfkRdin7f70n7PBNnDPPwmC6A/exec"></iframe>
        
    </div>
</body>
</html>
