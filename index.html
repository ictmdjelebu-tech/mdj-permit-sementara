<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem E-Permit - MDJ</title>
    <!-- Ikon Logo MDJ di Tab Browser -->
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/ms/0/07/Majlis_Daerah_Jelebu.png" type="image/png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Buang scroll bar luar supaya tak bertindih */
            background-color: #0f172a; /* Warna background sama dengan sistem */
        }
        .iframe-container {
            width: 100%;
            /* Trik ajaib untuk tolak banner amaran Google ke atas supaya ghaib */
            height: calc(100% + 45px);
            margin-top: -45px; 
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        
        <!-- Link Web App Bos Telah Dimasukkan Secara Automatik -->
        <iframe src="https://script.google.com/macros/s/AKfycbyQQzUzYeaLvgbRMHomcbAJuE_u6_UW-56j3rOzoI9Gj9MNIHKw1vr4tbEVX_CXUSABOQ/exec"></iframe>
        
    </div>
</body>
</html>
